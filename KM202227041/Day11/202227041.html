<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>색박만</title>
    <style>
        body{
            width: 404px;
            height: 204px;
        }
        div{
            position: relative;
            width: 200px;
            height: 100px;
            border: 1px solid black;
            float: left;
        }
        #sb{
            
            background-color: skyblue;
            border-right: 0px;
        }
        #hp{
            background-color: hotpink;
        }
        #yl{
            background-color: yellow;
            border-top: 0px;
            border-right: 0px;

        }
        #bl{
            background-color: black;
            border-top: 0px;

        }
        p{
            position: absolute;
            margin: 0 auto;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
        }
    </style>
</head>
<body>
    
    <div id="sb"><p>skyblue</p></div>
    <div id="hp"><p>hotpink</p></div>
    <div id="yl"><p style="color: black;">yellow</p></div>
    <div id="bl"><p>black</p></div>
    
</body>
</html>
