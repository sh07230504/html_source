<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>박스 모델 활용</title>
    <style>
        p{
            margin: 30px;
            padding: 20px;
            border: 5px dashed red;
        }
        div{
            margin: 30px;
            padding: 20px;
            border: 5px dotted red;
            background: yellow;
        }
    </style>
</head>
<body>
    <h3>박스 모델</h3>
        <p>margin 30px, padding 20px, border 5px의 빨간색 점선</p>
    <hr>
    <div>
        <img src="media/myMelody.png" alt="마이멜로디">
    </div>
</body>
</html>
