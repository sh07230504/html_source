<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>색 활용</title>
    <style>
        #div1{
            /* background-color: deepskyblue; */
            background-color: #00BFFF;
        }
        #div2{
            /* background-color: brown; */
            background-color: #A52A2A;
        }
        #div3{
            /* background-color: fuchsia; */
            background-color: #FF00FF;
        }
        #div4{
            background-color: darkorange;
        }
        #div5{
            background-color: darkcyan;
        }
        #div6{
            background-color: olivedrab;
        }
    </style>
</head>
<body>
    <h3>CSS3 색 활용</h3>
    <hr>
    <div id="div1">deepskyblue(#00BFFF)</div>
    <div id="div2">brown(#A52A2A)</div>
    <div id="div3">fuchsia(#FF00FF)</div>
    <div id="div4">darkorange(#FF8C00)</div>
    <div id="div5">darkcyan(#008B8B)</div>
    <div id="div6">olivedrab (#6B8E23)</div>
</body>
</html>
