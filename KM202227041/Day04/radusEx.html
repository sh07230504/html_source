<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        p{
            background: #90D000;
            width: 300px;
            padding: 20px;
        }
        #round1{
            border-radius: 50px;
        }
        #round2{
            border-radius: 0 20px 40px 60px;
        }
        #round3{
            border-radius: 0 20px 40px ;
        }
        #round4{
            border-radius: 0 20px 0 20px;
        }
        #round5{
            border-radius: 50px;
            border-style: dotted;
        }
        li{
             width: 90px;
            height: 50px;
            border: 1px solid gray; 
            float: left;
            list-style: none; 
         
        
        }
        li:first-child{
            border-radius: 20px 0 0 20px;
        }
        li:last-child{
            border-radius: 0 20px 20px 0;
        }
    </style>
</head>
<body>
    <h3>둥근 모서리 테두리</h3>
    <hr>
    <p id="round1">반지름 50픽셀의 둥근 모서리</p>
    <p id="round2">반지름 0, 20, 40, 60 둥근 모서리</p>
    <p id="round3">반지름 0, 20, 40, 20 둥근 모서리</p>
    <p id="round4">반지름 0, 20, 0, 20 둥근 모서리</p>
    <p id="round5">반지름 50의 둥근 점선 모서리</p>
    <ul>
        <li>메뉴1</li>
        <li>메뉴2</li>
        <li>메뉴3</li>
        <li>메뉴4</li>
        <li>메뉴5</li>
    </ul>
</body>
</html>
