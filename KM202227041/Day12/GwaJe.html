<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        * {
            padding: 0;
            margin: 0;
            box-sizing: border-box;
        }

        #total {
            width: 900px;
            height: 600px;
            margin: 0 auto;
        }

        #div1 {
            width: 790px;
            height: 50px;
            margin-left: 110px;
            padding-top: 10px;
        }

        #div1 h1 {
            font-size: 13px;
            font-weight: normal;
        }

        #div2 {
            width: 790px;
            height: 40px;
            margin-left: 110px;
            padding-top: 5px;
        }

        #div2 i {
            font-size: 13px;
        }

        #div3 {
            width: 900px;
            height: 510px;
            display: flex;
        }

        menu {
            width: 110px;
            padding-top: 10px;
            text-align: center;
        }

        span {
            border: 1px solid gray;
            width: 70px;
            height: 25px;
            line-height: 25px;
            display: inline-block;
            font-size: 12px;

        }


        #content {
            width: 790px;
            padding-left: 10px;
            padding-top: 10px;
        }

        img {
            width: 320px;
            height: 320px;
            display: block;
        }
    </style>
</head>

<body>
    <div id="total">

        <div id="div1">
            <h1>
                안녕하세요.<br>
                유한대학교 컴퓨터공학과 게임콘텐츠 전공입니다.
            </h1>
        </div>

        <div id="div2">
            <i>오늘은 날씨가 참 좋아요</i><br>
            <i><b>날씨 좋을 때 우리 함께 독서해봐요</b></i>
        </div>

        <div id="div3">
            <menu>
                <span id="span1">메뉴1</span><br>
                <span id="span2">메뉴2</span>
            </menu>

            <div id="content">
                <img src="https://vr.yuhan.ac.kr/bbs/file/getImage.do?editor=20210319140524_ruloyhhg.jpg" alt="더 플러스 이미지">
            </div>
        </div>

    </div>
</body>
</html>
