<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        #total{
            width: 1000px;
            height: 500px;
            border: 1px solid black;
        }
        #div1{
        width: 960px;
        height: 100px;
        border: 1px solid black;
        margin: auto 20px;
        }
        menu{
            margin: 0 auto;
            padding: 0;
            display: flex;
            gap: 0;
            margin-left: 100px;
            margin-top: 30px;
            align-items: center;
        }
        #item1{
            border: 1px solid black;
            border-radius: 10px 0 0 10px;
            margin: 0;
            width: 150px;
            height: 50px;
            display: flex;
            align-items: center;
            padding: 0 10px;
        }
        #item2{
            border: 1px solid black;
            border-radius: 0 10px 10px 0;
            margin: 0 ;
            width: 150px;
            height: 50px;
            display: flex;
            align-items: center;
            padding: 0 10px;
        }
        #div2{
            border: 1px solid black;
            width: 960px;
            height: 380px;
            margin: auto 20px;
            
        }
        #div3{
            background-color: yellow;
            width: 800px;
            height: 100%;
            margin-left: 100px;
        }
    </style>
</head>
<body>
    <div id="total">
        <div id="div1">
            <menu>
                <span id="item1">Item 1</span>
                <span id="item2">Item 2</span>
            </menu>
        </div>
        <div id="div2">
            <div id="div3"></div>
        </div>
    </div>
</body>
</html>
