<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>포지션 연습</title>
    <style>
        body{
            width: 404px;
            height: 204px;
        }
        #div{
            width: 200px;
            height: 200px;
        }
        #all{
            width: 100px;
            margin: 0 auto;
            display: flex;
            justify-content: flex-start;
        }
        #b {
            width: 100px;
            height: 100px;
            background-color: skyblue;
        }
        #p {
            width: 100px;
            height: 100px;
            background-color: hotpink;
        }
        #y {
            width: 100px;
            height: 100px;
            background-color: yellow;
        }
        #bl {
            width: 100px;
            height: 100px;
            background-color: black;
        }
    </style>
</head>
<body>
    <div id="all">
        <div id="b"></div>
        <div id="p"></div>
        <div id="y"></div>
        <div id="bl"></div>
    </div>
</body>
</html>
