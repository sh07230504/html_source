<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .bb{
            width: 404px;
        }
        div{
            width: 200px;
            height: 200px;
            float: left;
            border: 1px solid gray;
        }
        #box1{
            background-color: blue;
        }
        #box2{
            background-color: red;
        }
        #box3{
            background-color: yellow;
        }
        #box4{
            background-color: orange;
        }
        .character{
            width: 100px;
            position: relative;
        }
        #img01{
            top: 50%;
            left: 50%;
            transform: translate(-50%,-50%);
        }
        #img02{
            left: 50%;
        }
        #img03{
            top: 50%;
        }
        #img04{
            top: 50%;
            left: 50%;
        }
    </style>
</head>
<body>
    <div class="bb">
        <div id="box1" class="box">
            <img src="luke.jpg" alt="" id="img01" class="character">
        </div>
        <div id="box2" class="box">
            <img src="luke.jpg" alt="" id="img02" class="character">
        </div>
        <div id="box3" class="box">
            <img src="luke.jpg" alt="" id="img03" class="character">
        </div>
        <div id="box4" class="box">
            <img src="luke.jpg" alt="" id="img04" class="character">
        </div>
    </div>
</body>
</html>
