<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        div{
            display: inline-block;
            height: 100px;
            width: 100px;
            border: 1px solid lightgray;
            background-color: #ff0000;
            color: white;
            text-align: center;
        }
        #down:hover{
            position: relative;
            background-color: green;
            top: 20px;
            left: 20px;
        }
        #up:hover{
            position: relative;
            background-color: green;
            top: -20px;
            left: -20px;
        }
    </style>
</head>
<body>
    <h3>relative 예제</h3>
    <hr>
    <div>T</div>
    <div id="down">h</div>
    <div>a</div>
    <div>n</div>
    <div id="up">k</div>
    <div>s</div>
</body>

</html>
